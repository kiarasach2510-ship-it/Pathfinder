<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pathfinder</h1>
    <p>Discover careers made for you.</p>

    <div class="form-container">
        <label>What are your interests?</label>
        <input type="text" id="interests" placeholder="e.g. art, technology, helping people">

        <label>What are your goals?</label>
        <input type="text" id="goals" placeholder="e.g. make a good income, work remotely">

        <button onclick="getAdvice()">Find My Path</button>
    </div>

    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
